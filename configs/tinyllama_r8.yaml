# Run de référence : TinyLlama-1.1B, LoRA r=8 alpha=16, attention only.
model_name: TinyLlama/TinyLlama-1.1B-Chat-v1.0

data:
  dataset: alpaca_fr
  split: train
  subset: 5000
  max_seq_length: 1024

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules: [q_proj, v_proj]
  bias: none
  task_type: CAUSAL_LM

quant:
  load_in_4bit: false
  load_in_8bit: false

training:
  output_dir: runs/tinyllama_r8
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  num_train_epochs: 1.0
  warmup_ratio: 0.03
  bf16: true
